<!DOCTYPE html>
<html lang="ko"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/base}">

<div layout:fragment="content">
    <div class="row mt-3">
        <div class="col">
            <div class="card">
                <div class="card-header">
                    질문 등록하기 (Q&A)
                </div>
                <div class="card-body">
                    <form th:action="@{/inquiry/register}" method="post">
                        <div class="input-group mb-3">
                            <span class="input-group-text">제목</span>
                            <input type="text" name="title" class="form-control"
                                   placeholder="제목을 3자 이상 입력하세요" required minlength="3">
                        </div>

                        <div class="input-group mb-3">
                            <span class="input-group-text">내용</span>
                            <textarea class="form-control col-sm-5" rows="10"
                                      name="content" required placeholder="문의 내용을 상세히 입력하세요"></textarea>
                        </div>

                        <div class="input-group mb-3">
                            <span class="input-group-text">작성자</span>
                            <input type="text" name="mid" class="form-control" th:value="${mid}" readonly>
                        </div>

                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" name="secret" id="secretCheck">
                            <label class="form-check-label" for="secretCheck">
                                비밀글로 설정하기 (작성자와 관리자만 볼 수 있습니다.)
                            </label>
                        </div>

                        <div class="my-4">
                            <div class="float-end">
                                <button type="submit" class="btn btn-primary">등록하기</button>
                                <button type="reset" class="btn btn-secondary">다시쓰기</button>
                                <a th:href="@{/inquiry/list}" class="btn btn-info text-white">목록으로</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        // 📍 서버에서 넘어온 유효성 검사 에러 처리
        const errors = [[${errors}]]
        if(errors) {
            let errorMsg = ''
            for (let i = 0; i < errors.length; i++) {
                errorMsg += errors[i].defaultMessage + '\n'
            }
            alert(errorMsg)
        }

        // 📍 서버 에러(Exception) 처리
        const serverError = [[${error}]]
        if(serverError) {
            alert(serverError)
        }
    </script>
</th:block>
</html>
