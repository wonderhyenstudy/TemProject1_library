<!DOCTYPE html>
<html lang="ko"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/base}">

<div layout:fragment="content">
    <div class="card">
        <div class="card-header">
            <h5 class="card-title">질문과 답변 (Q&A)</h5>
        </div>
        <div class="card-body">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>번호</th>
                    <th>제목</th>
                    <th>작성자</th>
                    <th>등록일</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="dto : ${responseDTO.dtoList}">
                    <td th:text="${dto.ino}"></td>
                    <td>
                        <a th:href="@{/inquiry/read(ino=${dto.ino})}" th:text="${dto.title}"></a>
                        <span class="badge bg-info" th:if="${dto.replyCount > 0}" th:text="${dto.replyCount}"></span>
                    </td>
                    <td th:text="${dto.writer}"></td>
                    <td th:text="${#temporals.format(dto.regDate, 'yyyy-MM-dd')}"></td>
                </tr>

                <tr th:if="${#lists.isEmpty(responseDTO.dtoList)}">
                    <td colspan="4" class="text-center">등록된 질문이 없습니다.</td>
                </tr>
                </tbody>
            </table>
            <div class="text-end">
                <a th:href="@{/inquiry/register}" class="btn btn-primary">질문하기</a>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        console.log("Inquiry List Page Loaded");
    </script>
</th:block>
</html>
