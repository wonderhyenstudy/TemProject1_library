<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신청 내역 조회 | 마이페이지</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

    <style>
        body { font-family: "Pretendard", sans-serif; background-color: #f8f9fa; color: #333; }
        .container { max-width: 1000px; margin: 50px auto; background: #fff; padding: 40px; border-radius: 12px; shadow: 0 4px 20px rgba(0,0,0,0.08); }

        /* 제목 영역 */
        .page-title { border-bottom: 2px solid #003366; padding-bottom: 15px; margin-bottom: 30px; font-size: 24px; font-weight: 700; color: #1a1a1a; }

        /* 테이블 스타일 */
        .table { vertical-align: middle; }
        .table thead { background-color: #f9f9f9; border-top: 1px solid #333; }
        .table th { padding: 15px; font-weight: 600; color: #555; text-align: center; }
        .table td { padding: 15px; text-align: center; font-size: 15px; }

        /* 행사명 왼쪽 정렬 및 링크 스타일 */
        .event-title { text-align: left !important; font-weight: 500; }
        .event-title a { text-decoration: none; color: #1a1a1a; transition: color 0.2s; }
        .event-title a:hover { color: #0056b3; text-decoration: underline; }

        /* 상태 배지 */
        .badge-apply { background-color: #eef2f7; color: #003366; font-weight: 600; padding: 6px 12px; }
        .badge-finish { background-color: #f2f2f2; color: #888; font-weight: 500; padding: 6px 12px; }

        /* 취소 버튼 */
        .btn-cancel { font-size: 13px; padding: 4px 10px; border: 1px solid #dc3545; color: #dc3545; background: none; border-radius: 4px; transition: all 0.2s; }
        .btn-cancel:hover { background: #dc3545; color: #fff; }
    </style>
</head>
<body>

<div class="container shadow-sm">
    <h2 class="page-title">신청 내역 조회</h2>

    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
            <tr>
                <th style="width: 10%;">번호</th>
                <th style="width: 15%;">카테고리</th>
                <th style="width: 40%;">행사명</th>
                <th style="width: 20%;">행사 일시</th>
                <th style="width: 15%;">상태/관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="apply, state : ${applyList}">
                <td th:text="${state.count}">1</td>
                <td>
                        <span class="badge rounded-pill bg-light text-dark border"
                              th:text="${apply.eventCategory}">인문학</span>
                </td>
                <td class="event-title">
                    <a th:href="@{/event/read(id=${apply.eventId})}" th:text="${apply.eventTitle}">
                        2026년 3월 『월간 인문학을 만나다』
                    </a>
                </td>
                <td th:text="${#temporals.format(apply.eventDate, 'yyyy-MM-dd HH:mm')}">2026-03-20 14:00</td>
                <td>
                    <th:block th:with="today=${#temporals.createToday()}">
                        <div th:if="${apply.eventDate.toLocalDate() >= today}">
                            <span class="badge badge-apply mb-1">신청완료</span><br>
                            <button type="button" class="btn-cancel"
                                    th:onclick="'cancelApply(' + ${apply.applyId} + ')'">신청취소</button>
                        </div>
                        <div th:unless="${apply.eventDate.toLocalDate() >= today}">
                            <span class="badge badge-finish">종료된 행사</span>
                        </div>
                    </th:block>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(applyList)}">
                <td colspan="5" class="py-5 text-muted">신청하신 내역이 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script th:inline="javascript">
    // 신청 취소 함수
    function cancelApply(applyId) {
        if (confirm('정말 신청을 취소하시겠습니까?')) {
            fetch('/event/apply/cancel/' + applyId, {
                method: 'DELETE',
            })
                .then(res => {
                    if (res.ok) {
                        alert('신청이 취소되었습니다.');
                        location.reload();
                    } else {
                        alert('취소 처리 중 오류가 발생했습니다.');
                    }
                })
                .catch(err => {
                    console.error('Error:', err);
                    alert('서버 통신 오류가 발생했습니다.');
                });
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
