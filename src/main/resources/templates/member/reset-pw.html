<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<body>
<link rel="stylesheet" href="/css/busan-library-common.css">

<div layout:fragment="content">
    <div class="row mt-3 justify-content-center">
        <div class="col-md-6">

            <!-- 비밀번호 재설정 카드 -->
            <div class="card shadow-sm mb-5">
                <div class="card-header text-center py-3">
                    <h5 class="mb-0 fw-bold">비밀번호 재설정</h5>
                    <p class="text-muted small mb-0 mt-1">새로운 비밀번호를 입력해 주세요.</p>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/member/reset-pw}" method="post">
                        <!-- 본인확인된 mid hidden으로 전달 -->
                        <input type="hidden" name="mid" th:value="${verifiedMid}">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">새 비밀번호</label>
                            <input type="password" name="newPw" class="form-control"
                                   placeholder="새 비밀번호 입력" required minlength="4">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">새 비밀번호 확인</label>
                            <input type="password" id="newPwConfirm" class="form-control"
                                   placeholder="새 비밀번호 다시 입력" required>
                        </div>

                        <!-- 에러 메시지 -->
                        <div id="pwError" class="text-danger small mb-2" style="display:none;">
                            비밀번호가 일치하지 않습니다.
                        </div>

                        <div class="d-grid mt-4">
                            <button type="button" class="btn btn-primary" onclick="submitPw()">변경 완료</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer bg-light text-center py-3">
                    <a th:href="@{/member/login}" class="text-decoration-none text-muted small">로그인 페이지로 돌아가기</a>
                </div>
            </div>

        </div>
    </div>
</div>

<script layout:fragment="script" th:inline="javascript">
    function submitPw() {
        const newPw = document.querySelector("input[name='newPw']").value;
        const newPwConfirm = document.getElementById("newPwConfirm").value;
        const pwError = document.getElementById("pwError");

        if (newPw.length < 4) {
            pwError.textContent = "비밀번호는 최소 4자 이상이어야 합니다.";
            pwError.style.display = "block";
            return;
        }

        if (newPw !== newPwConfirm) {
            pwError.textContent = "비밀번호가 일치하지 않습니다.";
            pwError.style.display = "block";
            return;
        }

        pwError.style.display = "none";
        document.querySelector("form").submit();
    }
</script>
</body>
</html>
