<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<body>
<div layout:fragment="content">
    <div class="row mt-3 justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header text-center">
                    <h4>Library Login</h4>
                </div>
                <div class="card-body">
                    <form action="/member/login" method="post">
                        <div class="mb-3">
                            <label class="form-label">아이디</label>
                            <input type="text" name="mid" class="form-control" placeholder="ID" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">비밀번호</label>
                            <input type="password" name="mpw" class="form-control" placeholder="Password" required>
                        </div>

                        <div class="d-grid gap-2 my-4">
                            <button type="submit" class="btn btn-primary btn-lg">로그인</button>
                            <a th:href="@{/member/join}" class="btn btn-outline-secondary">회원가입 하러가기</a>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-muted text-center">
                    계정이 없으신가요? <a th:href="@{/member/join}" class="text-decoration-none">회원가입</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script layout:fragment="script" th:inline="javascript">
    // 1. 회원가입 성공 후 리다이렉트 되었을 때 메시지 (RedirectAttributes의 result)
    const result = [[${result}]]
    if(result === 'success') {
        alert("회원가입이 완료되었습니다! 로그인 해주세요.")
    }

    // 2. 로그인 실패 시 에러 처리 (RedirectAttributes의 error)
    const error = [[${error}]]
    if(error === 'id') {
        alert("존재하지 않는 아이디입니다.")
    } else if(error === 'password') {
        alert("비밀번호가 일치하지 않습니다.")
    }

    // 3. 로그아웃 후 돌아왔을 때 (컨트롤러에서 logout 파라미터를 보낼 경우)
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.has('logout')) {
        alert("로그아웃 되었습니다.")
    }
</script>

</body>
</html>
