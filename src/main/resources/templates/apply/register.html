<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>새 자료 등록 - 부산 IT 도서관</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .register-container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="register-container shadow-sm">
        <h3 class="text-center mb-4">📚 새 자료 등록</h3>
        <hr>

        <form th:action="@{/info/register}" method="post">

            <div class="mb-3">
                <label for="categoryName" class="form-label fw-bold">구분 (카테고리)</label>
                <input type="text" class="form-control" id="categoryName" name="categoryName"
                       placeholder="예: 일반도서, 아동도서, 기술과학" required>
            </div>

            <div class="mb-4">
                <label for="itemCount" class="form-label fw-bold">장서량 (권/매)</label>
                <input type="number" class="form-control" id="itemCount" name="itemCount"
                       placeholder="숫자만 입력하세요" required>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg">등록하기</button>
                <a th:href="@{/info/basic}" class="btn btn-outline-secondary">취소하고 돌아가기</a>
            </div>

        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
