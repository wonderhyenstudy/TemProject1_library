<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"> <div layout:fragment="content">
    <style>
        :root {
            --primary-blue: #003366;
            --sidebar-brown: #a68b6d;
            --border-color: #dee2e6;
            --text-gray: #666666;
            --light-bg: #f8f9fa;
        }
        /* body 스타일은 base.html과 겹칠 수 있으니 필요한 것만 유지 */
        .wrapper { display: flex; min-height: 100vh; }

        /* 사이드바 */
        .sidebar { min-width: 260px; border-right: 1px solid #333; background-color: #fff; }
        .sidebar-title { padding: 25px 20px; font-size: 20px; font-weight: bold; border-bottom: 1px solid #333; }
        .list-group-item { padding: 18px 20px; border: none; border-bottom: 1px solid #f0f0f0; font-size: 15px; }
        .list-group-item.active { background-color: var(--sidebar-brown) !important; color: white !important; }

        /* 메인 콘텐츠 */
        .main-content { flex-grow: 1; padding: 60px 80px; background-color: #fff; }
        h2 { font-size: 28px; font-weight: 700; margin-bottom: 30px; letter-spacing: -1px; }

        /* 검색 영역 */
        .search-container {
            background-color: var(--light-bg);
            padding: 20px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
            display: flex;
            justify-content: center; gap: 10px;
        }

        /* 리스트 카드 스타일 */
        .lecture-card {
            display: flex; align-items: center; padding: 25px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .lecture-card:hover { background-color: #fcfcfc; }

        .status-area { min-width: 120px; text-align: center; }
        .status-badge {
            display: inline-block; min-width: 70px; padding: 4px 10px;
            border-radius: 2px; font-size: 13px; font-weight: 500;
        }
        .status-ready { border: 1px solid var(--primary-blue); color: var(--primary-blue); }
        .status-ing { background-color: var(--primary-blue); color: #fff; }
        .status-end { background-color: #eee; color: #888; border: 1px solid #ddd; }

        .info-area { flex-grow: 1; padding-left: 20px; }
        .lecture-title { font-size: 19px; font-weight: 600; color: #222; text-decoration: none; display: block; margin-bottom: 6px; }
        .lecture-meta { font-size: 14px; color: var(--text-gray); }
        .lecture-meta span { margin-right: 25px; }
        .etc-area { min-width: 150px; text-align: right; font-size: 14px; color: #777; }

        /* 페이지네이션 커스텀 스타일 */
        .pagination { --bs-pagination-border-radius: 0; margin-top: 50px; }
        .page-link { color: #333; border: 1px solid var(--border-color); padding: 10px 18px; }
        .page-item.active .page-link {
            background-color: var(--primary-blue) !important;
            border-color: var(--primary-blue) !important;
            color: white;
        }
        .page-item.disabled .page-link { color: #ccc; }
        .page-link:hover { background-color: #f8f9fa; color: var(--primary-blue); }
    </style>

    <div class="wrapper">
        <div class="sidebar d-none d-md-block">
            <div class="sidebar-title">열린공간</div>
            <div class="list-group list-group-flush">
                <a th:href="@{/event/list}" class="list-group-item list-group-item-action">이달의 행사</a>
                <a th:href="@{/event/lecture}" class="list-group-item list-group-item-action active">강좌·세미나</a>
                <a th:href="@{/event/cinema}" class="list-group-item list-group-item-action">주말 극장</a>
            </div>
        </div>

        <div class="main-content">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb" style="font-size: 13px; color: #888; margin-bottom: 15px; background: none; padding: 0;">
                    <li class="breadcrumb-item">🏠</li>
                    <li class="breadcrumb-item" style="color: #888;">열린공간</li>
                    <li class="breadcrumb-item active" aria-current="page" style="color: #888;">강좌·세미나</li>
                </ol>
            </nav>

            <h2 style="font-size: 32px; color: #333; font-weight: bold; margin-bottom: 40px;">강좌·세미나</h2>

            <form th:action="@{/event/lecture}" method="get" class="search-container">
                <select class="form-select w-auto">
                    <option>제목</option>
                </select>
                <input type="text" name="keyword" class="form-control w-50"
                       th:value="${keyword}" placeholder="검색어를 입력해주세요.">
                <button type="submit" class="btn btn-dark px-4">보기</button>
            </form>

            <div style="border-top: 2px solid var(--primary-blue); margin-bottom: 0;"></div>

            <div th:each="lecture : ${lectureList}" class="lecture-card" th:with="today=${#temporals.createToday()}">
                <div class="status-area">
                    <span th:if="${lecture.eventDate.toLocalDate() > today}" class="status-badge status-ready">예정</span>
                    <span th:if="${lecture.eventDate.toLocalDate() == today}" class="status-badge status-ing">진행중</span>
                    <span th:unless="${lecture.eventDate.toLocalDate() >= today}" class="status-badge status-end">마감</span>
                </div>

                <div class="info-area">
                    <a th:href="@{/event/read(id=${lecture.id})}" class="lecture-title" th:text="${lecture.title}">강좌 제목</a>
                    <div class="lecture-meta">
                        <span>접수기간: <span th:text="${#temporals.format(lecture.eventDate, 'yyyy.MM.dd')}">2026.03.20</span></span>
                        <span>장소: <span th:text="${lecture.place}">장소 정보</span></span>
                    </div>
                </div>

                <div class="etc-area">
                    <span>신청자 <b class="text-primary">27</b>/무제한</span>
                </div>
            </div>

            <nav th:if="${page.totalPages > 0}">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/event/lecture(page=${page.number - 1}, keyword=${keyword})}">&laquo;</a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                        class="page-item" th:classappend="${i == page.number} ? 'active'">
                        <a class="page-link" th:href="@{/event/lecture(page=${i}, keyword=${keyword})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/event/lecture(page=${page.number + 1}, keyword=${keyword})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
</html>
