<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>주말 극장 | 도서관</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --primary-blue: #003366;
            --sidebar-brown: #a68b6d;
            --border-color: #dee2e6;
            --text-gray: #666666;
            --light-bg: #f8f9fa;
        }
        body { font-family: "Pretendard", sans-serif; margin: 0; color: #333; }
        .wrapper { display: flex; min-height: 100vh; }

        /* 사이드바 */
        .sidebar { min-width: 260px; border-right: 1px solid #333; background-color: #fff; }
        .sidebar-title { padding: 25px 20px; font-size: 20px; font-weight: bold; border-bottom: 1px solid #333; }
        .list-group-item { padding: 18px 20px; border: none; border-bottom: 1px solid #f0f0f0; font-size: 15px; }
        .list-group-item.active { background-color: var(--sidebar-brown) !important; color: white !important; }

        /* 메인 콘텐츠 */
        .main-content { flex-grow: 1; padding: 60px 80px; background-color: #fff; }
        h2 { font-size: 28px; font-weight: 700; margin-bottom: 30px; letter-spacing: -1px; }

        /* 검색 영역 스타일 */
        .search-container {
            background-color: var(--light-bg);
            padding: 25px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
        }
        .search-form { display: flex; gap: 10px; width: 100%; max-width: 600px; height: 45px; } /* 높이 고정 */

        /* [핵심 수정] 보기 버튼 디자인 */
        .btn-search {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 4px;
            font-weight: 600;
            min-width: 85px; /* 버튼이 쪼그라들지 않게 너비 고정 */
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .btn-search:hover { background-color: #002244; }

        /* 영화 카드 스타일 */
        .movie-card { border: none; transition: transform 0.2s; }
        .movie-card:hover { transform: translateY(-5px); }

        .poster-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 2 / 3;
            overflow: hidden;
            background-color: #f0f0f0;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .poster-img { width: 100%; height: 100%; object-fit: cover; }

        .movie-title {
            font-size: 18px; font-weight: 700; color: #222;
            margin-bottom: 6px; text-decoration: none; display: block;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        .movie-meta { font-size: 14px; color: var(--text-gray); }

        /* 페이지네이션 */
        .pagination { --bs-pagination-border-radius: 0; margin-top: 50px; }
        .page-link { color: #333; border: 1px solid var(--border-color); padding: 10px 18px; }
        .page-item.active .page-link {
            background-color: var(--primary-blue) !important;
            border-color: var(--primary-blue) !important;
            color: white;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="sidebar d-none d-md-block">
        <div class="sidebar-title">열린공간</div>
        <div class="list-group list-group-flush">
            <a th:href="@{/event/list}" class="list-group-item list-group-item-action">이달의 행사</a>
            <a th:href="@{/event/lecture}" class="list-group-item list-group-item-action">강좌·세미나</a>
            <a th:href="@{/event/cinema}" class="list-group-item list-group-item-action active">주말 극장</a>
        </div>
    </div>

    <div class="main-content">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb" style="font-size: 13px; color: #888; margin-bottom: 15px; background: none; padding: 0;">
                <li class="breadcrumb-item">🏠</li>
                <li class="breadcrumb-item" style="color: #888;">열린공간</li>
                <li class="breadcrumb-item active" aria-current="page" style="color: #888;">주말 극장</li>
            </ol>
        </nav>

        <h2 style="font-size: 32px; color: #333; font-weight: bold; margin-bottom: 40px;">주말 극장</h2>

        <div class="search-container">
            <form th:action="@{/event/cinema}" method="get" class="search-form">
                <select name="type" class="form-select" style="width: 120px;">
                    <option value="t">제목</option>
                </select>
                <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="검색어를 입력해주세요.">
                <button type="submit" class="btn-search">보기</button>
            </form>
        </div>

        <div style="border-top: 2px solid var(--primary-blue); margin-bottom: 30px;"></div>

        <div class="row row-cols-1 row-cols-md-4 g-4">
            <div th:each="movie : ${movieList}" class="col">
                <div class="movie-card h-100">
                    <a th:href="@{/event/read(id=${movie.id})}" class="text-decoration-none">
                        <div class="poster-wrapper">
                            <img th:if="${movie.imageName}" th:src="@{'/display?fileName=' + ${movie.imageName}}" class="poster-img" alt="영화 포스터">
                            <div th:unless="${movie.imageName}" style="display:flex; align-items:center; justify-content:center; height:100%; color: #999;">이미지 준비중</div>
                        </div>

                        <div class="movie-info">
                            <span class="movie-title" th:text="${movie.title}">영화 제목</span>
                            <div class="movie-meta">
                                상영일: <span th:text="${#temporals.format(movie.eventDate, 'yyyy-MM-dd')}">상영날짜</span>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>

        <nav th:if="${page.totalPages > 0}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/event/cinema(page=${page.number - 1}, keyword=${keyword})}">&laquo;</a>
                </li>
                <li th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                    class="page-item" th:classappend="${i == page.number} ? 'active'">
                    <a class="page-link" th:href="@{/event/cinema(page=${i}, keyword=${keyword})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/event/cinema(page=${page.number + 1}, keyword=${keyword})}">&raquo;</a>
                </li>
            </ul>
        </nav>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
