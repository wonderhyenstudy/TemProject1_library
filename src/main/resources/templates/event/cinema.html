<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<div layout:fragment="content">
    <style>
        /* 영화 카드 전체 정렬을 위한 스타일 */
        .main-wrapper { display: flex; min-height: 100vh; }

        .movie-card {
            border: none;
            transition: transform 0.2s;
            margin-bottom: 20px;
        }
        .movie-card:hover { transform: translateY(-5px); }

        /* [중요] 포스터 크기 고정! */
        .poster-wrapper {
            width: 100%;
            aspect-ratio: 2 / 3; /* 영화 포스터 황금 비율 */
            overflow: hidden;
            background-color: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .poster-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 이미지가 박스에 꽉 차게 조절 */
        }

        .movie-title {
            font-size: 17px;
            font-weight: 700;
            color: #222;
            margin-top: 10px;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* 검색창 버튼 스타일 유지 */
        .btn-search {
            background-color: #003366;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 4px;
            font-weight: 600;
        }
    </style>

    <div class="main-wrapper">
        <div class="sidebar d-none d-md-block" style="min-width: 260px; border-right: 1px solid #333; background-color: #fff;">
            <div class="sidebar-title" style="padding: 25px 20px; font-size: 20px; font-weight: bold; border-bottom: 1px solid #333;">열린공간</div>
            <div class="list-group list-group-flush">
                <a th:href="@{/event/list}" class="list-group-item list-group-item-action">이달의 행사</a>
                <a th:href="@{/event/lecture}" class="list-group-item list-group-item-action">강좌·세미나</a>
                <a th:href="@{/event/cinema}" class="list-group-item list-group-item-action active">주말 극장</a>
            </div>
        </div>

        <div class="main-content" style="flex-grow: 1; padding: 40px 60px;">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb" style="font-size: 13px; color: #888; margin-bottom: 15px;">
                    <li class="breadcrumb-item">🏠</li>
                    <li class="breadcrumb-item">열린공간</li>
                    <li class="breadcrumb-item active">주말 극장</li>
                </ol>
            </nav>

            <h2 style="font-size: 32px; color: #333; font-weight: bold; margin-bottom: 40px;">주말 극장</h2>

            <div class="search-container" style="background-color: #f8f9fa; padding: 25px; border: 1px solid #dee2e6; margin-bottom: 30px; display: flex; justify-content: center;">
                <form th:action="@{/event/cinema}" method="get" class="search-form" style="display: flex; gap: 10px; width: 100%; max-width: 600px; height: 45px;">
                    <select name="type" class="form-select" style="width: 120px;">
                        <option value="t">제목</option>
                    </select>
                    <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="검색어를 입력해주세요.">
                    <button type="submit" class="btn-search">보기</button>
                </form>
            </div>

            <div style="border-top: 2px solid #003366; margin-bottom: 30px;"></div>

            <div class="row row-cols-1 row-cols-sm-2 row-cols-md-4 g-4">
                <div th:each="movie : ${movieList}" class="col">
                    <div class="movie-card h-100">
                        <a th:href="@{/event/read(id=${movie.id})}" class="text-decoration-none">
                            <div class="poster-wrapper">
                                <img th:if="${movie.imageName}" th:src="${movie.imageName}" class="poster-img" alt="영화 포스터">
                                <div th:unless="${movie.imageName}" style="display:flex; align-items:center; justify-content:center; height:100%; color: #999; background: #eee;">
                                    <span>이미지 준비중</span>
                                </div>
                            </div>
                            <div class="movie-info">
                                <span class="movie-title" th:text="${movie.title}">영화 제목</span>
                                <div class="movie-meta" style="font-size: 14px; color: #666;">
                                    상영일: <span th:text="${#temporals.format(movie.eventDate, 'yyyy-MM-dd')}">상영날짜</span>
                                </div>
                            </div>
                        </a>
                    </div>
                </div>
            </div>

            <nav th:if="${page.totalPages > 0}" style="margin-top: 50px;">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/event/cinema(page=${page.number - 1}, keyword=${keyword})}">&laquo;</a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                        class="page-item" th:classappend="${i == page.number} ? 'active'">
                        <a class="page-link" th:href="@{/event/cinema(page=${i}, keyword=${keyword})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/event/cinema(page=${page.number + 1}, keyword=${keyword})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
</html>
