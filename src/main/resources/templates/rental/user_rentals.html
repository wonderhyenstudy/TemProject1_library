<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>내 대출 현황</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/user_style.css"/>
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="header-brand">
        <i class="bi bi-book-half"></i>
        <span>도서관</span>
    </div>
    <div class="header-user">

        <!-- ADMIN 권한일 때만 표시 -->
        <a id="admin-link" href="/rentals" style="display:none;align-items:center;gap:6px;
       padding:6px 14px;border-radius:8px;background:rgba(79,156,249,0.12);
       color:var(--accent);font-size:0.78rem;font-weight:600;text-decoration:none;
       border:1px solid rgba(79,156,249,0.25);transition:all 0.15s;">
            <i class="bi bi-shield-lock-fill"></i> 관리자 페이지
        </a>

        <div class="user-dot"></div>
        <span>안녕하세요, <strong id="username-display">회원</strong>님</span>
    </div>
</header>

<!-- MAIN -->
<main class="main">

    <!-- 인사말 -->
    <div class="greeting">
        <div class="greeting-sub">My Library</div>
        <div class="greeting-title"><span id="greeting-name">회원</span>님의 대출 현황</div>
    </div>

    <!-- 통계 카드 -->
    <div class="stat-row">
        <div class="stat-card sc-blue">
            <div class="stat-label">대출 중</div>
            <div class="stat-value" id="st-rented">—</div>
            <div class="stat-sub">현재 빌린 도서</div>
        </div>
        <div class="stat-card sc-warn">
            <div class="stat-label">연체</div>
            <div class="stat-value" id="st-overdue">—</div>
            <div class="stat-sub">반납 기한 초과</div>
        </div>
        <div class="stat-card sc-green">
            <div class="stat-label">연장 가능</div>
            <div class="stat-value" id="st-renewable">—</div>
            <div class="stat-sub">연장 안 한 도서</div>
        </div>
    </div>

    <!-- 대출 목록 -->
    <div class="section">
        <div class="section-head">
            <div class="section-title"><i class="bi bi-journals me-2"></i>내 대출 목록</div>
            <button class="btn-ghost" style="font-size:0.76rem;padding:6px 12px;" onclick="loadMyRentals()">
                <i class="bi bi-arrow-clockwise"></i> 새로고침
            </button>
        </div>
        <div class="rental-list" id="rental-list">
            <div class="empty-state">
                <span class="spinner" style="width:24px;height:24px;border-width:3px;color:var(--accent);"></span>
            </div>
        </div>
    </div>

</main>

<!-- 상세 모달 -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal-box">
        <div class="modal-header">
            <div class="modal-title"><i class="bi bi-file-text me-2"></i>대출 상세</div>
            <button class="modal-close" onclick="closeModalPanel()"><i class="bi bi-x"></i></button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer" id="modal-footer"></div>
    </div>
</div>

<!-- 토스트 -->
<div id="toast-wrap"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/user_app.js"></script>
</body>
</html>
