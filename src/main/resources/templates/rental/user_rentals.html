<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/busan-library-common.css">
    <link rel="stylesheet" href="/css/user_style.css"/>
</head>

<body>
<div layout:fragment="content">
    <div class="container section">
        <div class="row">

            <!--<div class="col-md-3 d-none d-md-block">
                <div th:replace="~{layout/mypage-left :: mypageLeft(${session.loginInfo.mid}, 'rentals')}"></div>
            </div>-->
            <div class="col-12">
            <!--<div class="col-md-9 col-12">-->

                <div class="section-title text-left mb-40">
                    <span class="section-title__en">MY RENTALS</span>
                    <h2 class="section-title__ko" th:text="|${session.loginInfo.mname}님의 대출 현황|">
                        회원님의 대출 현황
                    </h2>
                    <p class="section-title__desc">현재 대출 중인 도서와 연체 상태를 확인하실 수 있습니다.</p>
                </div>

                <div class="stat-row d-flex gap-3 mb-4">
                    <div class="stat-card sc-blue flex-fill p-3 border rounded shadow-sm">
                        <div class="stat-label fw-bold">대출 중</div>
                        <div class="stat-value h4" id="st-rented">—</div>
                        <div class="stat-sub text-muted small">현재 빌린 도서</div>
                    </div>
                    <div class="stat-card sc-warn flex-fill p-3 border rounded shadow-sm">
                        <div class="stat-label fw-bold text-danger">연체</div>
                        <div class="stat-value h4" id="st-overdue">—</div>
                        <div class="stat-sub text-muted small">반납 기한 초과</div>
                    </div>
                    <div class="stat-card sc-green flex-fill p-3 border rounded shadow-sm">
                        <div class="stat-label fw-bold text-success">연장 가능</div>
                        <div class="stat-value h4" id="st-renewable">—</div>
                        <div class="stat-sub text-muted small">연장 안 한 도서</div>
                    </div>
                </div>

                <div class="section shadow-sm p-4 border rounded bg-white">
                    <div class="section-head d-flex justify-content-between align-items-center mb-3">
                        <div class="section-title h5 mb-0">
                            <i class="bi bi-journals me-2 text-primary"></i>내 대출 목록
                        </div>
                        <button class="btn btn-outline-secondary btn-sm" onclick="loadMyRentals()">
                            <i class="bi bi-arrow-clockwise"></i> 새로고침
                        </button>
                    </div>

                    <div class="rental-list" id="rental-list">
                        <div class="empty-state text-center py-5">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                    </div>
                </div>

                <p class="text-muted mt-4 small">
                    ※ 반납 기한이 지난 도서는 연체로 표시되며, 대출이 제한될 수 있습니다.
                </p>
            </div> </div> </div> <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)" style="display:none;">
    <div class="modal-box">
        <div class="modal-header">
            <div class="modal-title"><i class="bi bi-file-text me-2"></i>대출 상세</div>
            <button class="modal-close" onclick="closeModalPanel()"><i class="bi bi-x"></i></button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer" id="modal-footer"></div>
    </div>
</div>
    <div id="toast-wrap"></div>

</div>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        var CURRENT_MEMBER_ID   = [[${session.loginInfo.id}]];
        var CURRENT_MEMBER_NAME = /*[[${session.loginInfo.mname}]]*/ '회원';
        var CURRENT_MEMBER_ROLE = /*[[${session.loginInfo.role}]]*/ 'USER';
        var CURRENT_ROLE        = CURRENT_MEMBER_ROLE;
    </script>
    <script th:src="@{/js/user_app.js}"></script>
</th:block>

</body>
</html>
