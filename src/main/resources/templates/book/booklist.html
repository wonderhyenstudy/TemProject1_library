<!DOCTYPE html>
<!--
    booklist.html

    [렌더링 전략]
    최초 진입 / 새로고침 → Thymeleaf(서버)가 HTML 완성해서 내려줌 (깜빡임 없음)
    페이지 전환 / 검색 / 정렬 → JS(axios)가 데이터만 받아서 리스트 영역만 교체

    [Thymeleaf 주요 속성 설명]
    th:each     : 배열/리스트를 반복해서 HTML 태그를 여러 개 생성 (Java의 for-each와 동일)
    th:text     : 태그 안의 텍스트를 서버 데이터로 채움
    th:src      : <img>의 src 속성을 서버 데이터로 채움
    th:attr     : 여러 속성을 한 번에 서버 데이터로 설정 (data-* 속성 등에 사용)
    th:classappend  : 기존 class에 조건에 따라 추가 클래스를 붙임
    th:if       : 조건이 true일 때만 해당 태그를 렌더링
    th:onclick  : onclick 이벤트에 서버 데이터를 끼워넣을 때 사용
    #temporals.format : 날짜/시간 타입을 원하는 형식의 문자열로 변환
    #numbers.sequence : 숫자 범위를 순서대로 생성 (예: 1,2,3,...,10)
    ?: ''       : 값이 null이면 빈 문자열로 대체 (null 안전 처리)
-->
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<body>
<!-- layout:fragment="content": base.html의 content 영역에 이 블록이 삽입됨 -->
<div layout:fragment="content">

    <!-- =============================================
         검색 영역

         form action="/board/booklist2" method="get"
         → 검색 버튼 클릭 시 GET /board/booklist2?keyword=... 로 이동
         → 하지만 JS에서 submit 이벤트를 가로채서 axios 비동기 처리로 대체함

         초기화 버튼은 type="button" 이라 form 제출을 하지 않음
         → JS의 .clearBtn 이벤트에서 처리
    ============================================= -->
    <div class="row mt-3 mx-4">
        <div class="col">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">검색 및 필터</h5>

                    <form action="/board/booklist2" method="get">
                        <div class="input-group">
                            <input type="text" class="form-control" name="keyword" placeholder="검색어를 입력하세요">
                            <button class="btn btn-outline-primary" type="submit">검색</button>
                            <!-- type="button": form submit을 일으키지 않음. JS clearBtn 이벤트에서 처리 -->
                            <button class="btn btn-outline-secondary clearBtn" type="button">초기화</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <!-- =============================================
         책 목록 영역

         [초기 렌더링 - Thymeleaf]
         서버에서 responseDTO를 내려주면 th:each로 리스트를 바로 그림
         → 새로고침 시 빈 화면 없이 즉시 목록이 보임 (깜빡임 방지)

         [이후 페이지 전환 - JS(axios)]
         페이지/검색/정렬 변경 시 JS의 loadList()가 axios로 데이터를 받아
         .list-group 안의 내용을 통째로 교체함
    ============================================= -->
    <div class="row content mt-3 mx-4">
        <div class="col">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span>책 목록</span>

                    <!-- 정렬 드롭다운: 각 항목의 data-sort 값이 JS sort-item 이벤트에서 사용됨 -->
                    <div class="dropdown">
                        <button class="btn btn-outline-secondary btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">정렬 기준</button>

                        <ul class="dropdown-menu">
                            <!-- data-sort: loadList() 호출 시 sort 파라미터로 전달됨 -->
                            <li><a class="dropdown-item sort-item" data-sort="regDate" href="#">최신 등록순</a></li>
                            <li><a class="dropdown-item sort-item" data-sort="pubdate" href="#">최신 발행순</a></li>
                            <li><a class="dropdown-item sort-item" data-sort="bookTitle" href="#">제목 가나다순</a></li>
                            <li><a class="dropdown-item sort-item" data-sort="recommend" href="#">최다 추천순</a></li>
                            <li><a class="dropdown-item sort-item" data-sort="rental" href="#">최다 대여순</a></li>
                        </ul>
                    </div>
                </div>

                <div class="card-body">

                    <!-- ─────────────────────────────────────────────
                         리스트 컨테이너
                         .list-group: JS에서 이 영역을 통째로 교체하는 기준점
                    ───────────────────────────────────────────── -->
                    <div class="list-group">

                        <!-- 데이터가 있는 경우: th:each로 각 책 항목 반복 렌더링 -->
                        <th:block th:if="${responseDTO != null and responseDTO.dtoList != null and !#lists.isEmpty(responseDTO.dtoList)}">

                            <!--
                                리스트 항목 1개 = 책 1권 (isbn 기준 대표 row)

                                [data-* 속성]
                                책의 모든 정보를 data-* 속성으로 심어둠
                                → 항목 클릭 시 JS가 data-* 값을 읽어서 상세 모달에 즉시 표시
                                → 별도 API 호출 없이 모달을 열 수 있어 응답 속도가 빠름
                            -->
                            <a href="#" class="list-group-item list-group-item-action"
                               th:each="dto : ${responseDTO.dtoList}"
                               th:attr="data-id=${dto.id},
                                        data-title=${dto.bookTitle},
                                        data-image=${dto.bookImage},
                                        data-author=${dto.author},
                                        data-publisher=${dto.publisher},
                                        data-pubdate=${dto.pubdate},
                                        data-isbn=${dto.isbn},
                                        data-description=${dto.description},
                                        data-status=${dto.status}">

                                <div class="d-flex w-100 gap-3 align-items-start">

                                    <!-- 왼쪽: 책 표지 이미지 -->
                                    <!-- ?: '' : bookImage가 null이면 빈 문자열로 대체 -->
                                    <div class="book-image-wrap">
                                        <img th:src="${dto.bookImage ?: ''}" alt="책 표지" style="width:150px; height:auto;">
                                    </div>

                                    <!-- 가운데: 제목 / 저자 / 출판사 -->
                                    <div class="flex-grow-1">
                                        <h5 class="mb-1" th:text="${dto.bookTitle}"></h5>
                                        <p class="mb-1 text-muted" th:text="${dto.author ?: ''}"></p>
                                        <small class="text-muted" th:text="${dto.publisher ?: ''}"></small>
                                    </div>

                                    <!-- 오른쪽: 대여 상태 / 추천 버튼 / 날짜 -->
                                    <div class="d-flex flex-column align-items-end justify-content-between book-actions" style="flex-shrink:0;">
                                        <div class="d-flex flex-column align-items-end gap-1">

                                            <!-- 대여 상태 뱃지
                                                 th:classappend: 기존 class에 조건에 따라 추가 클래스 붙임
                                                 AVAILABLE → bg-success(초록), 나머지 → bg-secondary(회색) -->
                                            <span class="badge"
                                                  th:classappend="${dto.status.name() == 'AVAILABLE'} ? 'bg-success' : 'bg-secondary'"
                                                  th:text="${dto.status.name() == 'AVAILABLE'} ? '대여 가능' : '대여 불가'"></span>

                                            <!-- 추천 버튼
                                                 dto.recommended = true  → btn-danger(빨간, '♥ 추천됨')
                                                 dto.recommended = false → btn-outline-danger(테두리, '♡ 추천하기') -->
                                            <button class="btn btn-sm recommend-btn"
                                                    th:classappend="${dto.recommended} ? 'btn-danger' : 'btn-outline-danger'"
                                                    th:attr="data-id=${dto.id}"
                                                    th:text="${dto.recommended} ? '♥ 추천됨' : '♡ 추천하기'"></button>
                                        </div>

                                        <!-- 발행일 / 등록일
                                             #temporals.format: LocalDate/LocalDateTime을 'yyyy-MM-dd' 형식 문자열로 변환
                                             != null 체크: 날짜 값이 없을 때 '-' 표시 -->
                                        <div class="text-end text-muted" style="font-size:0.8rem;">
                                            <div th:text="'발행일 ' + (${dto.pubdate} != null ? ${#temporals.format(dto.pubdate, 'yyyy-MM-dd')} : '-')"></div>
                                            <div th:text="'등록일 ' + (${dto.regDate} != null ? ${#temporals.format(dto.regDate, 'yyyy-MM-dd')} : '-')"></div>
                                        </div>
                                    </div>

                                </div>
                            </a>
                        </th:block>

                        <!-- 데이터가 없는 경우: 안내 문구 표시 -->
                        <th:block th:if="${responseDTO == null or responseDTO.dtoList == null or #lists.isEmpty(responseDTO.dtoList)}">
                            <div class="text-center text-muted py-4">검색 결과가 없습니다.</div>
                        </th:block>

                    </div><!-- /.list-group -->


                    <!-- ─────────────────────────────────────────────
                         페이지네이션
                         #numbers.sequence(start, end): start부터 end까지 숫자 목록 생성
                         th:classappend: 현재 페이지 번호와 같으면 'active' 클래스 추가
                         th:onclick: 클릭 시 JS loadList() 호출 (|...| 는 Thymeleaf 문자열 결합 문법)
                    ───────────────────────────────────────────── -->
                    <div class="d-flex justify-content-center mt-4">
                        <ul class="pagination flex-wrap">
                            <th:block th:if="${responseDTO != null and responseDTO.dtoList != null}">

                                <!-- [이전] 버튼: 이전 페이지 그룹이 있을 때만 표시 -->
                                <li class="page-item" th:if="${responseDTO.prev}">
                                    <a class="page-link" href="#"
                                       th:onclick="|loadList(${responseDTO.start - 1}); return false;|">Previous</a>
                                </li>

                                <!-- 페이지 번호 버튼들: start ~ end 범위만큼 생성 -->
                                <li class="page-item"
                                    th:each="i : ${#numbers.sequence(responseDTO.start, responseDTO.end)}"
                                    th:classappend="${responseDTO.page == i} ? 'active' : ''">
                                    <a class="page-link" href="#"
                                       th:onclick="|loadList(${i}); return false;|"
                                       th:text="${i}"></a>
                                </li>

                                <!-- [다음] 버튼: 다음 페이지 그룹이 있을 때만 표시 -->
                                <li class="page-item" th:if="${responseDTO.next}">
                                    <a class="page-link" href="#"
                                       th:onclick="|loadList(${responseDTO.end + 1}); return false;|">Next</a>
                                </li>

                            </th:block>
                        </ul>
                    </div>

                </div><!-- /.card-body -->
            </div><!-- /.card -->
        </div>
    </div>


    <!-- =============================================
         추천 완료 / 취소 확인 모달

         JS에서 추천 버튼 클릭 후 API 응답이 오면
         modal-title-text, modal-body-text를 채우고 modal.show()로 표시
    ============================================= -->
    <div class="modal fade" id="recommendModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <!-- JS에서 '추천 완료 ♥' 또는 '추천 취소 ♡' 텍스트를 넣음 -->
                    <h5 class="modal-title" id="modal-title-text"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- JS에서 결과 메시지를 넣음 -->
                    <p id="modal-body-text"></p>
                </div>
            </div>
        </div>
    </div>


    <!-- =============================================
         책 상세정보 모달

         리스트 항목 클릭 시 JS가 data-* 속성값을 읽어서
         아래 id들(detail-book-title, detail-author, ...) 에 직접 채워 넣음
         → API 재호출 없이 즉시 모달을 열 수 있음
    ============================================= -->
    <div class="modal fade" id="bookDetailModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <!-- JS: detail-book-title에 책 제목을 채움 -->
                    <h5 class="modal-title" id="detail-book-title">책 상세정보</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">

                    <!-- 상단: 책 표지 + 기본 정보 테이블 -->
                    <div class="d-flex gap-4">

                        <!-- 책 표지 이미지: JS에서 src를 채움 -->
                        <div class="detail-book-image-wrap">
                            <img id="detail-book-image" src="" alt="책 표지"
                                 style="width:130px; height:auto; border-radius:4px;">
                        </div>

                        <!-- 기본 정보 테이블: JS에서 각 <td>에 텍스트를 채움 -->
                        <div class="flex-grow-1">
                            <table class="table table-sm table-borderless mb-0">
                                <tbody>
                                    <tr>
                                        <th class="text-muted fw-normal" style="width:70px;">저자</th>
                                        <td id="detail-author"></td>
                                    </tr>
                                    <tr>
                                        <th class="text-muted fw-normal">출판사</th>
                                        <td id="detail-publisher"></td>
                                    </tr>
                                    <tr>
                                        <th class="text-muted fw-normal">발행일</th>
                                        <td id="detail-pubdate"></td>
                                    </tr>
                                    <tr>
                                        <th class="text-muted fw-normal">ISBN</th>
                                        <td id="detail-isbn"></td>
                                    </tr>
                                    <tr>
                                        <th class="text-muted fw-normal">상태</th>
                                        <!-- JS에서 대여 가능 여부에 따라 뱃지 색상도 변경 -->
                                        <td><span id="detail-status" class="badge"></span></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 하단: 책 소개 텍스트 -->
                    <!-- white-space:pre-wrap: 줄바꿈(\n)을 그대로 표시 -->
                    <hr>
                    <h6 class="fw-semibold">책 소개</h6>
                    <p id="detail-description" class="text-muted" style="white-space:pre-wrap; font-size:0.9rem;"></p>
                </div>

                <div class="modal-footer">
                    <!-- 대여 가능이면 '대여하기'(초록), 불가면 '닫기'(회색)으로 JS가 변경 -->
                    <button type="button" id="detail-action-btn" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- axios 라이브러리: CDN으로 불러옴. 비동기 HTTP 요청에 사용 -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</div><!-- /layout:fragment="content" -->

<!--
    layout:fragment="script": base.html의 </body> 직전에 이 블록이 삽입됨
    → DOM이 모두 로드된 후 JS가 실행되므로 document.querySelector 등이 안전하게 동작함
-->
<script layout:fragment="script" th:src="@{/js/booklist.js}"></script>

</body>
</html>
