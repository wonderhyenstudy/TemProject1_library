<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-center gap-2 mb-5">
        <a th:href="@{/info}" class="btn btn-outline-dark btn-sm shadow-sm">👋 관장 인사말</a>
        <a th:href="@{/info/history}" class="btn btn-outline-dark btn-sm shadow-sm">📜 도서관 연혁</a>
        <a th:href="@{/info/organization}" class="btn btn-outline-dark btn-sm shadow-sm">🏢 조직업무</a>
        <a th:href="@{/info/guide}" class="btn btn-outline-dark btn-sm shadow-sm">📖 이용안내</a>
        <a th:href="@{/info/facilities}" class="btn btn-outline-dark btn-sm shadow-sm">🏢 시설 현황</a>
        <a th:href="@{/info/map}" class="btn btn-outline-dark btn-sm shadow-sm">📍 찾아오시는 길</a>
    </div>

    <h2 class="mb-4 fw-bold">➕ 새 자료 현황 등록</h2>
    <hr>

    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-body p-5">
            <p class="text-muted mb-4">* 도서관의 새로운 자료 카테고리와 수량을 입력해 주세요.</p>

            <form th:action="@{/info/register}" method="post">
                <input type="hidden" name="infoId" value="1">

                <div class="mb-4 row">
                    <label for="categoryName" class="col-sm-2 col-form-label fw-bold">구분(카테고리)</label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control form-control-lg" id="categoryName" name="categoryName"
                               placeholder="예: 일반도서, 아동도서, DVD 등" required>
                    </div>
                </div>

                <div class="mb-4 row">
                    <label for="itemCount" class="col-sm-2 col-form-label fw-bold">장서량 (권/매)</label>
                    <div class="col-sm-10">
                        <input type="number" class="form-control form-control-lg" id="itemCount" name="itemCount"
                               placeholder="숫자만 입력해 주세요" required min="0">
                    </div>
                </div>

                <hr class="my-4">

                <div class="d-flex justify-content-center gap-3">
                    <button type="submit" class="btn btn-primary px-5 py-2 fw-bold">등록하기</button>
                    <a th:href="@{/info/basic}" class="btn btn-outline-secondary px-5 py-2">취소</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script layout:fragment="script" th:inline="javascript">
    console.log("자료 등록 페이지 로드 완료");

    // 등록 전 자바스크립트 유효성 검사 (성규님의 코드 유지 및 보완)
    document.querySelector('form').addEventListener('submit', function(e) {
        const itemCount = document.getElementById('itemCount').value;
        if (itemCount < 0) {
            alert('장서량은 0보다 작을 수 없습니다. 다시 확인해 주세요.');
            e.preventDefault();
        }
    });
</script>
</body>
</html>
