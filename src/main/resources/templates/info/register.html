<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<body>
<div layout:fragment="content">
    <h2 class="mb-4 fw-bold">새 자료 현황 등록</h2>
    <hr>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <p class="text-muted mb-4">* 도서관의 새로운 자료 카테고리와 수량을 입력해 주세요.</p>

            <form th:action="@{/info/register}" method="post">
                <input type="hidden" name="infoId" value="1">

                <div class="mb-3 row">
                    <label for="categoryName" class="col-sm-2 col-form-label fw-bold">구분(카테고리)</label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control" id="categoryName" name="categoryName"
                               placeholder="예: 일반도서, 아동도서, DVD 등" required>
                    </div>
                </div>

                <div class="mb-3 row">
                    <label for="itemCount" class="col-sm-2 col-form-label fw-bold">장서량 (권/매)</label>
                    <div class="col-sm-10">
                        <input type="number" class="form-control" id="itemCount" name="itemCount"
                               placeholder="숫자만 입력해 주세요" required>
                    </div>
                </div>

                <hr class="my-4">

                <div class="d-flex justify-content-center gap-2">
                    <button type="submit" class="btn btn-primary px-5">등록하기</button>
                    <a th:href="@{/info/basic}" class="btn btn-secondary px-5">취소</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script layout:fragment="script" th:inline="javascript">
    console.log("자료 등록 페이지 로드 완료");

    // 등록 전 간단한 유효성 검사 예시
    document.querySelector('form').addEventListener('submit', function(e) {
        const itemCount = document.getElementById('itemCount').value;
        if (itemCount < 0) {
            alert('장서량은 0보다 작을 수 없습니다.');
            e.preventDefault();
        }
    });
</script>
</body>
</html>
