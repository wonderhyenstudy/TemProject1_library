<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-center gap-2 mb-5">
        <a th:href="@{/info}" class="btn btn-outline-dark btn-sm shadow-sm">👋 관장 인사말</a>
        <a th:href="@{/info/history}" class="btn btn-outline-dark btn-sm shadow-sm active">📜 도서관 연혁</a>
        <a th:href="@{/info/organization}" class="btn btn-outline-dark btn-sm shadow-sm">🏢 조직업무</a>
        <a th:href="@{/info/guide}" class="btn btn-outline-dark btn-sm shadow-sm">📖 이용안내</a>
        <a th:href="@{/info/facilities}" class="btn btn-outline-dark btn-sm shadow-sm">🏢 시설 현황</a>
        <a th:href="@{/info/map}" class="btn btn-outline-dark btn-sm shadow-sm">📍 찾아오시는 길</a>
    </div>

    <h2 class="mb-4 fw-bold">📜 도서관 연혁</h2>
    <p class="text-muted">부산도서관이 걸어온 발자취를 소개합니다.</p>
    <hr>

    <div class="card shadow-sm border-0 rounded-3 overflow-hidden">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <tbody class="border-top-0">
                <tr>
                    <th class="text-primary p-4 bg-light-subtle" style="width: 25%">📅 2026. 03.</th>
                    <td class="fw-bold">도서관 관리 시스템 고도화 및 홈페이지 개편 (성규님 프로젝트)</td>
                </tr>
                <tr>
                    <th class="text-primary p-4 bg-light-subtle">📅 2025. 12.</th>
                    <td>디지털 정보 서비스실 및 멀티미디어존 개관</td>
                </tr>
                <tr>
                    <th class="text-primary p-4 bg-light-subtle">📅 2020. 05.</th>
                    <td>부산도서관 공식 개관 및 운영 시작</td>
                </tr>
                <tr>
                    <th class="text-primary p-4 bg-light-subtle">📅 2019. 11.</th>
                    <td>도서관 설립 인가 및 착공</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="text-center mt-5">
        <a th:href="@{/}" class="btn btn-dark px-5 shadow-sm">🏠 메인으로 돌아가기</a>
    </div>
</div>
</body>
</html>
