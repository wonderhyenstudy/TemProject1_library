<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<body>
<div layout:fragment="content">
    <h2 class="mb-4 fw-bold">도서관 연혁</h2>
    <hr>
    <div class="card shadow-sm border-0">
        <div class="card-body">
            <table class="table table-hover align-middle">
                <tbody>
                <tr>
                    <th class="text-primary p-3" style="width: 25%">2026. 03.</th>
                    <td>도서관 관리 시스템 고도화 및 홈페이지 개편</td>
                </tr>
                <tr>
                    <th class="text-primary p-3">2025. 12.</th>
                    <td>디지털 정보 서비스실 및 멀티미디어존 개관</td>
                </tr>
                <tr>
                    <th class="text-primary p-3">2020. 05.</th>
                    <td>부산도서관 공식 개관 및 운영 시작</td>
                </tr>
                <tr>
                    <th class="text-primary p-3">2019. 11.</th>
                    <td>도서관 설립 인가 및 착공</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="text-center mt-5">
        <a th:href="@{/info}" class="btn btn-dark px-5">메인으로 돌아가기</a>
    </div>
</div>
</body>
</html>
