<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>부산 IT 도서관 - 찾아오시는 길</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/maps.js?apikey=YOUR_APP_KEY&autoload=false"></script>
    <style>
        .container { max-width: 900px; margin-top: 30px; }
        .section-title { border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-top: 50px; margin-bottom: 20px; font-weight: bold; }
        .info-box { background-color: #f8f9fa; border-left: 5px solid #007bff; padding: 20px; border-radius: 5px; }
        #map { width: 100%; height: 450px; border-radius: 10px; border: 1px solid #ddd; background-color: #eee; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/info/basic}">부산 IT 도서관</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/info/basic}">홈/자료현황</a>
            <a class="nav-link" th:href="@{/info/organization}">조직&업무</a>
            <a class="nav-link" th:href="@{/info/facilities}">시설현황</a>
            <a class="nav-link active" th:href="@{/info/map}">찾아오시는 길</a>
        </div>
    </div>
</nav>

<div class="container mb-5">
    <h2 class="section-title">찾아오시는 길</h2>
    <div class="info-box shadow-sm mb-4">
        <h5 class="text-primary fw-bold">위치 안내</h5>
        <p class="mb-1"><strong>주소 :</strong> 부산광역시 부산진구 중앙대로 708 (부산 IT 교육센터)</p>
        <p class="mb-0"><strong>전화 :</strong> 051-123-4567</p>
    </div>

    <div id="map" class="shadow-sm"></div>

    <div class="text-end mt-3">
        <a href="https://map.kakao.com/link/to/부산 IT 교육센터,35.1558913,129.0601438" target="_blank" class="btn btn-outline-primary btn-sm">큰지도로 보기</a>
    </div>
</div>

<script>
    // 2. kakao.maps.load를 사용하여 라이브러리가 완전히 로드된 후 실행합니다.
    kakao.maps.load(function() {
        var mapContainer = document.getElementById('map');
        var mapOption = {
            center: new kakao.maps.LatLng(35.1558913, 129.0601438),
            level: 3
        };

        var map = new kakao.maps.Map(mapContainer, mapOption);

        var markerPosition  = new kakao.maps.LatLng(35.1558913, 129.0601438);

        var marker = new kakao.maps.Marker({
            position: markerPosition
        });

        marker.setMap(map);

        var iwContent = '<div style="padding:5px; width:150px; text-align:center;">부산 IT 도서관</div>';
        var infowindow = new kakao.maps.InfoWindow({
            content : iwContent
        });

        infowindow.open(map, marker);
    });
</script>

</body>
</html>
