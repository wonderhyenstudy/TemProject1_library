<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<body>
<div layout:fragment="content">
    <h2 class="mb-4 fw-bold">이용안내</h2>
    <hr>
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card h-100 shadow-sm border-0 bg-light p-4">
                <h5 class="fw-bold text-primary mb-3">🕒 이용 시간</h5>
                <p class="mb-1"><strong>평일/주말 :</strong> 09:00 ~ 18:00</p>
                <p class="mb-0 text-danger"><strong>정기 휴관일 :</strong> 매주 월요일, 법정 공휴일</p>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card h-100 shadow-sm border-0 bg-light p-4">
                <h5 class="fw-bold text-success mb-3">📖 대출 규정</h5>
                <p class="mb-1"><strong>대출 권수 :</strong> 1인당 최대 5권</p>
                <p class="mb-0"><strong>대출 기간 :</strong> 14일 (연장 1회 7일 가능)</p>
            </div>
        </div>
    </div>
    <div class="text-center mt-5">
        <a th:href="@{/info}" class="btn btn-dark px-5">메인으로 돌아가기</a>
    </div>
</div>
</body>
</html></html>
