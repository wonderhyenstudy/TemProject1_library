<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-center gap-2 mb-5">
        <a th:href="@{/info}" class="btn btn-outline-dark btn-sm shadow-sm">👋 관장 인사말</a>
        <a th:href="@{/info/history}" class="btn btn-outline-dark btn-sm shadow-sm">📜 도서관 연혁</a>
        <a th:href="@{/info/organization}" class="btn btn-outline-dark btn-sm shadow-sm">🏢 조직업무</a>
        <a th:href="@{/info/guide}" class="btn btn-outline-dark btn-sm shadow-sm active">📖 이용안내</a>
        <a th:href="@{/info/facilities}" class="btn btn-outline-dark btn-sm shadow-sm">🏢 시설 현황</a>
        <a th:href="@{/info/map}" class="btn btn-outline-dark btn-sm shadow-sm">📍 찾아오시는 길</a>
    </div>

    <h2 class="mb-4 fw-bold">📖 이용 안내</h2>
    <hr>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title fw-bold text-primary border-bottom pb-2">⏰ 이용 시간</h5>
                    <p class="card-text mt-3"><strong>화 ~ 일 :</strong> 09:00 ~ 22:00</p>
                    <p class="card-text"><strong>월요일/공휴일 :</strong> 정기 휴관</p>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title fw-bold text-primary border-bottom pb-2">📚 대출 규정</h5>
                    <p class="card-text mt-3"><strong>대출 권수 :</strong> 1인 5권 이내</p>
                    <p class="card-text"><strong>대출 기간 :</strong> 14일 (1회 7일 연장 가능)</p>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center mt-5">
        <a th:href="@{/}" class="btn btn-dark px-5 shadow-sm">메인으로 돌아가기</a>
    </div>
</div>
</body>
</html>
