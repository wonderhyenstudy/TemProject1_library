<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>도서관 안내 및 자료현황</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .info-container { max-width: 900px; margin: 50px auto; }
        .greeting-box { background-color: #f8f9fa; border-left: 5px solid #0d6efd; padding: 20px; margin-bottom: 30px; }
        .section-title { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; margin-top: 40px; }
    </style>
</head>
<body>

<div class="container info-container">
    <h1 class="display-4 text-primary mb-4" th:text="${info.libraryName}">도서관 명칭</h1>

    <div class="greeting-box">
        <h3 class="h5">관장 인사말</h3>
        <p class="mb-0">
            안녕하세요. 우리 도서관 방문을 진심으로 환영합니다.<br>
            저희 도서관은 지역 주민 여러분의 지식 탐구와 문화적 성장을 돕기 위해 최선을 다하고 있습니다.<br>
            언제나 편안하게 머물다 가실 수 있는 따뜻한 공간이 되겠습니다. 감사합니다.
        </p>
    </div>

    <h3 class="section-title">도서관 이용 안내</h3>
    <table class="table table-bordered">
        <tbody>
        <tr>
            <th class="table-light" style="width: 20%;">주소</th>
            <td th:text="${info.address}">도서관 주소 정보가 출력됩니다.</td>
        </tr>
        <tr>
            <th class="table-light">연락처</th>
            <td th:text="${info.contact}">051-XXX-XXXX</td>
        </tr>
        <tr>
            <th class="table-light">기증 안내</th>
            <td th:text="${info.donationGuide}">도서 기증 관련 안내 문구입니다.</td>
        </tr>
        </tbody>
    </table>

    <h3 class="section-title">자료 현황</h3>
    <div class="row">
        <div class="col-md-6">
            <table class="table table-hover text-center">
                <thead class="table-dark">
                <tr>
                    <th>구분</th>
                    <th>장서량 (권/매)</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="stat : ${stats}">
                    <td th:text="${stat.categoryName}">일반도서</td>
                    <td th:text="${#numbers.formatInteger(stat.itemCount, 0, 'COMMA')}">0</td>
                </tr>
                <tr th:if="${#lists.isEmpty(stats)}">
                    <td colspan="2">등록된 통계 데이터가 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
