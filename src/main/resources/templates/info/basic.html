<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-center gap-2 mb-5">
        <a th:href="@{/info}" class="btn btn-outline-dark btn-sm shadow-sm">
            👋 관장 인사말
        </a>
        <a th:href="@{/info/history}" class="btn btn-outline-dark btn-sm shadow-sm">
            📜 도서관 연혁
        </a>
        <a th:href="@{/info/organization}" class="btn btn-outline-dark btn-sm shadow-sm">
            🏢 조직업무
        </a>
        <a th:href="@{/info/guide}" class="btn btn-outline-dark btn-sm shadow-sm">
            📖 이용안내
        </a>
        <a th:href="@{/info/facilities}" class="btn btn-outline-dark btn-sm shadow-sm">
            🏢 시설 현황
        </a>
        <a th:href="@{/info/map}" class="btn btn-outline-dark btn-sm shadow-sm">
            📍 찾아오시는 길
        </a>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold m-0">📊 도서 자료 현황</h2>
        <a th:href="@{/info/donation}" class="text-decoration-none fw-bold text-primary">도서 기증/납본 절차 안내 ></a>
    </div>

    <div class="table-responsive shadow-sm rounded border">
        <table class="table table-hover text-center align-middle mb-0">
            <thead class="table-light">
            <tr>
                <th style="width: 40%">구분</th>
                <th style="width: 30%">장서량 (권/매)</th>
                <th style="width: 30%">관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="stat : ${stats}">
                <td class="fw-bold" th:text="${stat.categoryName}">구분</td>
                <td th:text="${#numbers.formatInteger(stat.itemCount, 0, 'COMMA')}">0</td>
                <td>
                    <div class="btn-group">
                        <a th:href="@{/info/modify(id=${stat.statId})}" class="btn btn-success btn-sm px-3">수정</a>
                        <form th:action="@{/info/remove}" method="post" style="display:inline;">
                            <input type="hidden" name="statId" th:value="${stat.statId}">
                            <button type="submit" class="btn btn-danger btn-sm px-3" onclick="return confirm('정말 삭제하시겠습니까?')">삭제</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="d-flex justify-content-between mt-5">
        <a th:href="@{/}" class="btn btn-dark px-4 shadow-sm">🏠 메인 홈페이지로</a>
        <a th:href="@{/info/register}" class="btn btn-primary px-4 shadow-sm">➕ 새 자료 등록하기</a>
    </div>

</div>
</body>
</html>
