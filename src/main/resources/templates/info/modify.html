<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-center gap-2 mb-5">
        <a th:href="@{/info}" class="btn btn-outline-dark btn-sm shadow-sm">👋 관장 인사말</a>
        <a th:href="@{/info/history}" class="btn btn-outline-dark btn-sm shadow-sm">📜 도서관 연혁</a>
        <a th:href="@{/info/organization}" class="btn btn-outline-dark btn-sm shadow-sm">🏢 조직업무</a>
        <a th:href="@{/info/guide}" class="btn btn-outline-dark btn-sm shadow-sm">📖 이용안내</a>
        <a th:href="@{/info/facilities}" class="btn btn-outline-dark btn-sm shadow-sm">🏢 시설 현황</a>
        <a th:href="@{/info/map}" class="btn btn-outline-dark btn-sm shadow-sm">📍 찾아오시는 길</a>
    </div>

    <h2 class="mb-4 fw-bold">📊 자료 현황 수정</h2>
    <hr>

    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-body p-5">
            <p class="text-muted mb-4">* 선택하신 자료의 카테고리명과 수량을 수정할 수 있습니다.</p>

            <form th:action="@{/info/modify}" method="post">
                <input type="hidden" name="statId" th:value="${stat.statId}">
                <input type="hidden" name="infoId" th:value="${stat.infoId}">

                <div class="mb-4 row">
                    <label for="categoryName" class="col-sm-2 col-form-label fw-bold">구분(카테고리)</label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control form-control-lg" id="categoryName" name="categoryName"
                               th:value="${stat.categoryName}" required>
                    </div>
                </div>

                <div class="mb-4 row">
                    <label for="itemCount" class="col-sm-2 col-form-label fw-bold">장서량 (권/매)</label>
                    <div class="col-sm-10">
                        <input type="number" class="form-control form-control-lg" id="itemCount" name="itemCount"
                               th:value="${stat.itemCount}" required min="0">
                    </div>
                </div>

                <hr class="my-4">

                <div class="d-flex justify-content-center gap-3">
                    <button type="submit" class="btn btn-success px-5 py-2 fw-bold">수정 완료</button>
                    <a th:href="@{/info/basic}" class="btn btn-outline-secondary px-5 py-2">취소</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script layout:fragment="script" th:inline="javascript">
    console.log("자료 수정 페이지 로드 완료");
</script>
</body>
</html>
