<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<body>
<div layout:fragment="content">
    <h2 class="mb-4 fw-bold">자료 현황 수정</h2>
    <hr>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <p class="text-muted mb-4">* 선택하신 자료의 카테고리명과 수량을 수정할 수 있습니다.</p>

            <form th:action="@{/info/modify}" method="post">
                <input type="hidden" name="statId" th:value="${stat.statId}">
                <input type="hidden" name="infoId" th:value="${stat.infoId}">

                <div class="mb-3 row">
                    <label for="categoryName" class="col-sm-2 col-form-label fw-bold">구분(카테고리)</label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control" id="categoryName" name="categoryName"
                               th:value="${stat.categoryName}" required>
                    </div>
                </div>

                <div class="mb-3 row">
                    <label for="itemCount" class="col-sm-2 col-form-label fw-bold">장서량 (권/매)</label>
                    <div class="col-sm-10">
                        <input type="number" class="form-control" id="itemCount" name="itemCount"
                               th:value="${stat.itemCount}" required>
                    </div>
                </div>

                <hr class="my-4">

                <div class="d-flex justify-content-center gap-2">
                    <button type="submit" class="btn btn-success px-5">수정 완료</button>
                    <a th:href="@{/info/basic}" class="btn btn-secondary px-5">취소</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script layout:fragment="script" th:inline="javascript">
    console.log("자료 수정 페이지 로드 완료");
</script>
</body>
</html>
