<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<body>
<div layout:fragment="content">
    <h2 class="mb-4 fw-bold">조직 & 업무</h2>
    <hr>
    <div class="card shadow-sm border-0">
        <ul class="list-group list-group-flush">
            <li class="list-group-item p-4">
                <h5 class="fw-bold text-primary">도서관장</h5>
                <p class="mb-0 text-muted">도서관 운영 전반에 관한 정책 결정 및 총괄 관리</p>
            </li>
            <li class="list-group-item p-4">
                <h5 class="fw-bold text-primary">사서운영팀</h5>
                <p class="mb-0 text-muted">도서 자료 수집, 분류, 대출 및 독서 문화 프로그램 기획</p>
            </li>
            <li class="list-group-item p-4">
                <h5 class="fw-bold text-primary">시설지원팀</h5>
                <p class="mb-0 text-muted">도서관 건물 유지 보수 및 대관 시설 예약 관리</p>
            </li>
        </ul>
    </div>
    <div class="text-center mt-5">
        <a th:href="@{/info}" class="btn btn-dark px-5">메인으로 돌아가기</a>
    </div>
</div>
</body>
</html>
