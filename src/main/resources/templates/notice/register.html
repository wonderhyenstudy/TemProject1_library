<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<div layout:fragment="content">
    <div class="container-fluid px-4">
        <h2 class="mt-4 fw-bold">공지사항 등록</h2>

        <div class="card mb-4 border-0 shadow-sm">
            <div class="card-header bg-primary text-white">
                새 공지사항 작성
            </div>
            <div class="card-body">
                <form action="/notice/register" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold">제목</label>
                        <input type="text" name="title" class="form-control" placeholder="제목을 입력하세요" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">내용</label>
                        <textarea name="content" class="form-control" rows="10" placeholder="공지 내용을 입력하세요" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">작성자</label>
                        <input type="text" name="writer" class="form-control bg-light"
                               th:value="${session.loginInfo.mid}" readonly>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <button type="submit" class="btn btn-primary px-4">등록</button>
                        <a th:href="@{/notice/list}" class="btn btn-secondary px-4">취소</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</html>
