<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<div layout:fragment="content">
    <div class="container-fluid px-4">
        <h2 class="mt-4 fw-bold">공지사항 상세내용</h2>

        <div class="card mb-4 border-0 shadow-sm">
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label fw-bold">번호</label>
                    <input type="text" class="form-control bg-light" th:value="${dto.nno}" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">제목</label>
                    <input type="text" class="form-control bg-light" th:value="${dto.title}" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">내용</label>
                    <textarea class="form-control bg-light" rows="10" readonly>[[${dto.content}]]</textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">작성자</label>
                    <input type="text" class="form-control bg-light" th:value="${dto.writer}" readonly>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a th:href="|@{/notice/list}?${pageRequestDTO.getLink()}|" class="btn btn-secondary px-4">목록</a>
                    <a th:href="|@{/notice/modify(nno=${dto.nno})}&${pageRequestDTO.getLink()}|" class="btn btn-primary px-4">수정</a>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
