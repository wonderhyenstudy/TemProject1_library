<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<div layout:fragment="content">
    <div class="container-fluid px-4">
        <h2 class="mt-4 fw-bold">공지사항 수정/삭제</h2>

        <div class="card mb-4 border-0 shadow-sm">
            <div class="card-body">
                <form th:action="@{/notice/modify}" method="post" id="f1">
                    <input type="hidden" name="page" th:value="${pageRequestDTO.page}">
                    <input type="hidden" name="size" th:value="${pageRequestDTO.size}">

                    <div class="mb-3">
                        <label class="form-label fw-bold">글번호</label>
                        <input type="text" name="nno" class="form-control bg-light" th:value="${dto.nno}" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">제목</label>
                        <input type="text" name="title" class="form-control" th:value="${dto.title}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">내용</label>
                        <textarea name="content" class="form-control" rows="10">[[${dto.content}]]</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">작성자</label>
                        <input type="text" name="writer" class="form-control bg-light" th:value="${dto.writer}" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">파일 첨부</label>
                        <input type="file" name="uploadFiles" class="form-control" multiple>
                    </div>

                    <div class="row mt-3">
                        <div class="col d-flex flex-wrap" id="uploadResult">
                            <th:block th:each="fileName:${dto.fileNames}">
                                <div class="card shadow-sm m-2 p-1" style="width: 150px;">
                                    <img class="card-img-top" th:src="|/view/${fileName}|" th:data-src="${fileName}">
                                    <div class="card-body p-2 text-center">
                                        <button type="button" class="btn btn-danger btn-sm w-100"
                                                th:onclick="removeFile([[${fileName}]], this)">삭제</button>
                                    </div>
                                </div>
                            </th:block>
                        </div>
                    </div>

                    <div id="uploadHidden">
                        <th:block th:each="fileName:${dto.fileNames}">
                            <input type="hidden" name="fileNames" th:value="${fileName}">
                        </th:block>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <button type="button" class="btn btn-secondary listBtn">목록</button>
                        <button type="button" class="btn btn-primary modBtn">수정하기</button>
                        <button type="button" class="btn btn-danger removeBtn">삭제하기</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script layout:fragment="script" th:inline="javascript">
    const link = [[${pageRequestDTO.getLink()}]];
    const formObj = document.querySelector("#f1");
    const uploadResult = document.querySelector("#uploadResult");
    const uploadHidden = document.querySelector("#uploadHidden");

    // 1. 목록 버튼 클릭 시 이동 (페이징 정보 유지)
    document.querySelector(".listBtn").addEventListener("click", function(e){
        e.preventDefault();
        self.location = "/notice/list?" + link;
    }, false);

    // 2. 수정 버튼 클릭 시 제출
    document.querySelector(".modBtn").addEventListener("click", function(e){
        e.preventDefault();

        formObj.action = "/notice/modify?" + link;
        formObj.method = "post";
        formObj.submit();
    }, false);

    // 3. 삭제 버튼 클릭 시 제출
    document.querySelector(".removeBtn").addEventListener("click", function(e){
        e.preventDefault();

        if(!confirm("정말 삭제하시겠습니까?")) return;

        formObj.action = "/notice/remove";
        formObj.method = "post";
        formObj.submit();
    }, false);

    // 4. 파일 선택 및 비동기 업로드 처리 (Axios 기반)
    document.querySelector("input[name='uploadFiles']").addEventListener("change", function(e){
        const files = e.target.files;
        if(files.length === 0) return;

        const formData = new FormData();
        for (let i = 0; i < files.length; i++) {
            formData.append("files", files[i]);
        }

        // 📍 /upload 컨트롤러로 전송
        axios.post('/upload', formData, {
            headers: { 'Content-Type': 'multipart/form-data' }
        }).then(res => {
            appendResult(res.data);
        }).catch(err => {
            alert("파일 업로드에 실패했습니다.");
        });
    }, false);

    // 5. 미리보기 및 hidden input 생성 메서드
    function appendResult(arr){
        for(let fileInfo of arr){
            const fileName = fileInfo.uuid + "_" + fileInfo.fileName;

            const div = document.createElement("div");
            div.className = "card shadow-sm m-2 p-1";
            div.style.width = "150px";

            const imgUrl = fileInfo.image ? `/view/s_${fileName}` : `/assets/img/file-icon.png`;

            div.innerHTML = `
                <img class="card-img-top" src="${imgUrl}" data-src="${fileName}">
                <div class="card-body p-2 text-center">
                    <button type="button" class="btn btn-danger btn-sm w-100"
                            onclick="removeFile('${fileName}', this)">삭제</button>
                </div>`;
            uploadResult.appendChild(div);

            const hidden = document.createElement("input");
            hidden.type = "hidden";
            hidden.name = "fileNames";
            hidden.value = fileName;
            uploadHidden.appendChild(hidden);
        }
    }

    // 6. 첨부파일 삭제 (전역 함수로 선언하여 th:onclick 및 일반 onclick 대응)
    window.removeFile = function(fileName, btn){
        if(!confirm("해당 파일을 삭제하시겠습니까?")) return;

        // 미리보기 카드 삭제
        btn.closest(".card").remove();
        // Hidden input 삭제
        const targetInput = uploadHidden.querySelector(`input[value='${fileName}']`);
        if(targetInput) targetInput.remove();


    }
</script>
</html>
